name: Autograding Tests

on:
  - push
  - workflow_dispatch

permissions:
  actions: read
  contents: read

jobs:
  autograding:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Install Leiningen
        run: |
          curl -fsSL https://raw.githubusercontent.com/technomancy/leiningen/stable/bin/lein -o /usr/local/bin/lein
          chmod +x /usr/local/bin/lein
          lein version

      - name: Install TypeScript dependencies
        run: cd typescript && npm install

      - name: Install Clojure dependencies
        run: cd clojure && lein deps

      # ── TypeScript exercises ────────────────────────────────────────────

      - name: "Ej01 — Pipeline filter/map/reduce (TS)"
        id: ej01
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: "Ej01 — Pipeline filter/map/reduce"
          command: "cd typescript && npx vitest run tests/ej01.test.ts"
          timeout: "10"
          max-score: "5"

      - name: "Ej02 — Composición pipe/compose (TS)"
        id: ej02
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: "Ej02 — Composición pipe/compose"
          command: "cd typescript && npx vitest run tests/ej02.test.ts"
          timeout: "10"
          max-score: "6"

      - name: "Ej03 — Inmutabilidad con spread (TS)"
        id: ej03
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: "Ej03 — Inmutabilidad con spread"
          command: "cd typescript && npx vitest run tests/ej03.test.ts"
          timeout: "10"
          max-score: "4"

      - name: "Ej05 — flatMap y reduce (TS)"
        id: ej05
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: "Ej05 — flatMap y reduce"
          command: "cd typescript && npx vitest run tests/ej05.test.ts"
          timeout: "10"
          max-score: "5"

      - name: "Ej06 — Partial application (TS)"
        id: ej06
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: "Ej06 — Partial application"
          command: "cd typescript && npx vitest run tests/ej06.test.ts"
          timeout: "10"
          max-score: "6"

      - name: "Ej08 — Currying (TS)"
        id: ej08
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: "Ej08 — Currying"
          command: "cd typescript && npx vitest run tests/ej08.test.ts"
          timeout: "10"
          max-score: "6"

      - name: "Ej10 — Result y validación (TS)"
        id: ej10
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: "Ej10 — Result y validación"
          command: "cd typescript && npx vitest run tests/ej10.test.ts"
          timeout: "10"
          max-score: "7"

      - name: "Ej11 — Middleware como HOF (TS)"
        id: ej11
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: "Ej11 — Middleware como HOF"
          command: "cd typescript && npx vitest run tests/ej11.test.ts"
          timeout: "10"
          max-score: "6"

      - name: "Ej13 — Recursión de cola (TS)"
        id: ej13
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: "Ej13 — Recursión de cola TS"
          command: "cd typescript && npx vitest run tests/ej13.test.ts"
          timeout: "10"
          max-score: "5"

      - name: "Ej14 — Memoization (TS)"
        id: ej14
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: "Ej14 — Memoization"
          command: "cd typescript && npx vitest run tests/ej14.test.ts"
          timeout: "10"
          max-score: "5"

      - name: "Ej17 — Integrador TypeScript"
        id: ej17
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: "Ej17 — Integrador TypeScript"
          command: "cd typescript && npx vitest run tests/ej17.test.ts"
          timeout: "10"
          max-score: "7"

      # ── Clojure exercises ───────────────────────────────────────────────

      - name: "Ej04 — Pipeline con ->> (Clj)"
        id: ej04
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: "Ej04 — Pipeline con ->>"
          command: "cd clojure && lein test tp04.ej04-test"
          timeout: "10"
          max-score: "5"

      - name: "Ej07 — Partial en Clojure (Clj)"
        id: ej07
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: "Ej07 — Partial en Clojure"
          command: "cd clojure && lein test tp04.ej07-test"
          timeout: "10"
          max-score: "5"

      - name: "Ej09 — Validadores currying (Clj)"
        id: ej09
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: "Ej09 — Validadores currying"
          command: "cd clojure && lein test tp04.ej09-test"
          timeout: "10"
          max-score: "5"

      - name: "Ej12 — Recursión de cola (Clj)"
        id: ej12
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: "Ej12 — Recursión de cola Clojure"
          command: "cd clojure && lein test tp04.ej12-test"
          timeout: "10"
          max-score: "6"

      - name: "Ej15 — Lazy sequences (Clj)"
        id: ej15
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: "Ej15 — Lazy sequences"
          command: "cd clojure && lein test tp04.ej15-test"
          timeout: "10"
          max-score: "5"

      - name: "Ej16 — DSL data-driven (Clj)"
        id: ej16
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: "Ej16 — DSL data-driven"
          command: "cd clojure && lein test tp04.ej16-test"
          timeout: "10"
          max-score: "5"

      - name: "Ej18 — Integrador Clojure"
        id: ej18
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: "Ej18 — Integrador Clojure"
          command: "cd clojure && lein test tp04.ej18-test"
          timeout: "10"
          max-score: "7"

      # ── Reporter ────────────────────────────────────────────────────────

      - name: Autograding Reporter
        uses: classroom-resources/autograding-grading-reporter@v1
        with:
          runners: ej01,ej02,ej03,ej04,ej05,ej06,ej07,ej08,ej09,ej10,ej11,ej12,ej13,ej14,ej15,ej16,ej17,ej18
        env:
          EJ01_RESULTS: "${{steps.ej01.outputs.result}}"
          EJ02_RESULTS: "${{steps.ej02.outputs.result}}"
          EJ03_RESULTS: "${{steps.ej03.outputs.result}}"
          EJ04_RESULTS: "${{steps.ej04.outputs.result}}"
          EJ05_RESULTS: "${{steps.ej05.outputs.result}}"
          EJ06_RESULTS: "${{steps.ej06.outputs.result}}"
          EJ07_RESULTS: "${{steps.ej07.outputs.result}}"
          EJ08_RESULTS: "${{steps.ej08.outputs.result}}"
          EJ09_RESULTS: "${{steps.ej09.outputs.result}}"
          EJ10_RESULTS: "${{steps.ej10.outputs.result}}"
          EJ11_RESULTS: "${{steps.ej11.outputs.result}}"
          EJ12_RESULTS: "${{steps.ej12.outputs.result}}"
          EJ13_RESULTS: "${{steps.ej13.outputs.result}}"
          EJ14_RESULTS: "${{steps.ej14.outputs.result}}"
          EJ15_RESULTS: "${{steps.ej15.outputs.result}}"
          EJ16_RESULTS: "${{steps.ej16.outputs.result}}"
          EJ17_RESULTS: "${{steps.ej17.outputs.result}}"
          EJ18_RESULTS: "${{steps.ej18.outputs.result}}"
        if: always()
